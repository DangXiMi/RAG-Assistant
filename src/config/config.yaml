chunker:
  chunk_size: 512
  overlap: 50
  separator: ["\n\n", "\n", ". ", "? ", "! ", " ", ""]

embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 32
  device: "auto"  # auto, cpu, cuda

qdrant:
  host: ":memory:" 
  port: 6333
  collection_name: "rag_documents"
  vector_size: 384  

retrieval:
  default_top_k: 5
  score_threshold: 0.7