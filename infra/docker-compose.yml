version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "6333:6333"   
      - "6334:6334"   
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: raglab
      POSTGRES_PASSWORD: raglab
      POSTGRES_DB: rag_metadata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: rag-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: raglab@ex.com
      PGADMIN_DEFAULT_PASSWORD: raglab
    ports:
      - "5050:80"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  postgres_data:
  redis_data: